<!DOCTYPE html>
<html lang="en" class="dark">

<head>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              900: '#0b3330',
              800: '#114a46',
              700: '#1a5550',
              gray: '#1f2937',
            },
            pop: {
              pink: '#ff2d95',
              cyan: '#00e5ff',
              green: '#39ff14',
              yellow: '#ffe600',
              violet: '#bf40ff',
            }
          },
          fontFamily: {

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {

      color: #e5e7eb;
    }

    .glass-panel {
      background: rgba(17, 74, 70, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.4);
    }
  </style>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

        { id: 'zbi-score',      label: 'ZBI-22 Burden Score',    nestedFlow: ['Annual ZBI re-administer', 'Trend vs baseline charted', 'Mid-cycle re-tier rule'] },
        { id: 'cp-adherence',   label: 'Care Plan Adherence',    nestedFlow: ['Task completion tracked', 'SLA breaches surfaced', 'Remediation tasks created'] },

    const findPrescribable = (typeId, prescribableId) =>
      (PRESCRIBABLES[typeId] || []).find(p => p.id === prescribableId);

    // Helper to build prebuilt demo phase nodes compactly. `selected` is an array of
    // prescribable IDs. Any locked items that are pre-selected are treated as already
    // approved (added to approvedLocks automatically).
    const phaseNode = (id, typeId, title, subtitle, selected, branch) => {
      const sel = selected || [];
      const approvedLocks = sel.filter(pid => {
        const p = (PRESCRIBABLES[typeId] || []).find(x => x.id === pid);
        return p && p.locked;
      });
      return {
        id,
        typeId,
        type: NODE_TYPES.find(t => t.id === typeId),
        branch,
        title,
        subtitle,
        data: { selected: sel, approvedLocks }
      };
    };

        'co-navigator': [

          phaseNode('guide-con-p2', 'decide', 'Phase 2 — Intake with PCP Loop', 'Intake + consent + PCP notification', ['cms-elig'], 'guide'),
          phaseNode('guide-con-p3', 'assess', 'Phase 3 — Bridge PCP + GUIDE Records', 'EHR sharing or summary doc workflow', ['dem-mod'], 'guide'),
          phaseNode('guide-con-p4', 'treat', 'Phase 4 — Shared Care Plan', 'Care nav authors plan; PCP signs off', ['guide-plan'], 'guide'),
          phaseNode('guide-con-p5', 'monitor', 'Phase 5 — Daily Bridge Workflow', 'Scheduled PCP syncs, slightly lighter caseload', ['cp-adherence'], 'guide'),
          phaseNode('guide-con-p6', 'outcome', 'Phase 6 — Sync Loops + Audit', 'Documentation across both teams, dual audit', ['guide-compliance'], 'guide'),
        ],
      }
    };

    const ENGAGEMENT_OPTIONS = [
      { id: 'full', label: 'Full GUIDE' },
      { id: 'co', label: 'Co-managed' }
    ];
    const VIEWPOINT_OPTIONS = [
      { id: 'patient', label: 'Patient' },
      { id: 'caregiver', label: 'Caregiver' },
      { id: 'provider', label: 'Provider' },
      { id: 'navigator', label: 'Care nav' }
    ];
    const SEVERITY_OPTIONS = [
      { id: 'mild',     label: 'Mild',     hex: '#39ff14', cpt: '99205', cptLabel: 'New patient office visit' },
      { id: 'moderate', label: 'Moderate', hex: '#ffe600', cpt: '99483', cptLabel: 'Cognitive assessment & care plan' },
      { id: 'severe',   label: 'Severe',   hex: '#ff2d95', cpt: '99215', cptLabel: 'Established patient follow-up' }
    ];

    // Reusable node card — used by both Build and Demo modes.
    // Each node shows a list of prescribables that can be toggled on/off (added/removed
    // from the patient's flow). Locked prescribables require an escalation approval click
    // before they can be added.
    const NodeCard = ({ node, onRemove, onToggle, onApprove, showConnector }) => {
      const prescribables = PRESCRIBABLES[node.typeId] || [];
      const selected = node.data?.selected || [];
      const approvedLocks = node.data?.approvedLocks || [];
      const [pendingApproval, setPendingApproval] = useState(null);
      const title = node.title || node.type.label;
      const subtitle = node.subtitle;
      const hex = node.type.hex;

      const requestApproval = (pid) => {
        if (pendingApproval === pid) {
          onApprove(node.id, pid);
          setPendingApproval(null);
        } else {
          setPendingApproval(pid);
        }
      };

      return (
        <div className="relative flex flex-col items-center w-full">
          <div
            className="w-full glass-panel rounded-xl border p-4 mb-2 shadow-2xl relative group transition-all animate-fade-in-up"
            style={{ borderColor: `${hex}40` }}
          >
            {onRemove && (
              <button
                onClick={() => onRemove(node.id)}
                className="absolute top-3 right-3 text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity z-10"
              >
                <IconTrash2 />
              </button>
            )}
            <div className="flex items-start gap-3 mb-3">
              <div className="p-2 rounded-lg shrink-0" style={{ backgroundColor: `${hex}20`, color: hex }}>
                {node.type.icon}
              </div>
              <div className="flex-1 min-w-0">
                <h3 className="font-semibold text-base text-white leading-tight">{title}</h3>
                {subtitle && <p className="text-xs text-gray-400 mt-1 leading-snug">{subtitle}</p>}
              </div>
            </div>

            <div className="mt-3 pt-3 border-t border-white border-opacity-5">
              <div className="text-[10px] uppercase tracking-widest font-semibold text-gray-500 mb-2 flex items-center justify-between">
                <span>Prescribables</span>
                <span className="text-gray-600 normal-case tracking-normal">{selected.length} selected</span>
              </div>
              <div className="flex flex-col gap-1">
                {prescribables.map(p => {
                  const isSelected = selected.includes(p.id);
                  const isApproved = approvedLocks.includes(p.id);
                  const showsLock = p.locked && !isApproved;
                  const isPending = pendingApproval === p.id;

                  return (
                    <div key={p.id}>
                      <button
                        type="button"
                        onClick={() => {
                          if (showsLock) requestApproval(p.id);
                          else onToggle(node.id, p.id);
                        }}
                        className={`group/row w-full flex items-center gap-2 px-2 py-1.5 rounded-md text-left text-sm transition-all ${
                          isSelected
                            ? 'bg-white bg-opacity-5 border border-current'
                            : showsLock
                              ? 'bg-pop-pink bg-opacity-5 border border-pop-pink border-opacity-20 hover:bg-opacity-10 text-gray-300'
                              : 'border border-transparent hover:bg-white hover:bg-opacity-5 text-gray-300'
                        }`}
                        style={isSelected ? { color: hex, borderColor: `${hex}60` } : {}}
                      >
                        <span className={`shrink-0 w-4 h-4 rounded flex items-center justify-center border ${
                          isSelected ? '' : showsLock ? 'text-pop-pink border-pop-pink border-opacity-50' : 'border-gray-600 text-gray-500'
                        }`}
                        style={isSelected ? { backgroundColor: hex, borderColor: hex, color: '#051614' } : {}}>
                          {isSelected
                            ? <svg viewBox="0 0 12 12" className="w-3 h-3"><path d="M2 6.5l2.5 2.5L10 3.5" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
                            : showsLock
                              ? <IconLock />
                              : <IconPlus />}
                        </span>
                        <span className="flex-1 truncate">{p.label}</span>
                        {p.locked && isApproved && (
                          <span className="text-[9px] uppercase tracking-widest text-pop-green font-semibold flex items-center gap-1 shrink-0">
                            <IconUnlock /> Approved
                          </span>
                        )}
                        {showsLock && !isPending && (
                          <span className="text-[9px] uppercase tracking-widest text-pop-pink font-semibold shrink-0">Requires approval</span>
                        )}
                      </button>

                      {showsLock && isPending && (
                        <div className="ml-6 mt-1 mb-1 px-3 py-2 bg-pop-pink bg-opacity-10 border border-pop-pink border-opacity-30 rounded-md text-xs text-pop-pink flex items-center justify-between gap-2 animate-fade-in-up">
                          <span className="flex items-center gap-2"><IconLock /> {p.lockReason || 'Escalation required'}</span>
                          <div className="flex items-center gap-1">
                            <button onClick={() => setPendingApproval(null)} className="px-2 py-0.5 text-gray-400 hover:text-white rounded">Cancel</button>
                            <button onClick={() => requestApproval(p.id)} className="px-2 py-0.5 bg-pop-pink text-[#051614] font-semibold rounded">Request approval</button>
                          </div>
                        </div>
                      )}

                      {isSelected && (
                        <div className="ml-6 mt-0.5 mb-1.5 pl-3 border-l-2 animate-fade-in-up" style={{ borderColor: `${hex}40` }}>
                          {p.nestedFlow.map((step, i) => (
                            <div key={i} className="text-[11px] text-gray-400 py-0.5 flex items-start gap-2 leading-snug">
                              <span className="shrink-0 mt-0.5 opacity-60" style={{ color: hex }}><IconCornerDown /></span>
                              <span>{step}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
                {prescribables.length === 0 && (
                  <p className="text-xs text-gray-500 italic">No prescribables defined for this node type.</p>
                )}
              </div>
            </div>
          </div>
          {showConnector && (
            <div className="h-8 w-px bg-gradient-to-b from-gray-500 to-transparent my-1"></div>
          )}
        </div>
      );
    };

    const ModeToggle = ({ mode, setMode }) => (
      <div className="inline-flex items-center bg-[#072321] border border-teal-900 rounded-lg p-1 shadow-inner">
        {['build', 'demo'].map(m => (
          <button
            key={m}
            onClick={() => setMode(m)}
            className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all capitalize tracking-wide ${
              mode === m
                ? 'bg-pop-cyan text-[#051614] shadow'
                : 'text-gray-400 hover:text-white'
            }`}
          >
            {m}
          </button>
        ))}
      </div>
    );

    const DemoLegend = () => (
      <div className="w-64 glass-panel border-r border-teal-900 flex flex-col items-center py-6 px-4 shrink-0 transition-all z-20 shadow-xl relative">
        <h2 className="text-xl font-bold mb-2 text-white tracking-widest uppercase">Demo</h2>
        <p className="text-xs text-gray-400 mb-6 text-center leading-relaxed">
          Prebuilt Agilon referral pathway. Use the controls bar to flip severity or layer the Guide overlay. Any node's fields stay editable.
        </p>
        <div className="flex flex-col gap-3 w-full">
          {NODE_TYPES.map(node => (
            <div
              key={node.id}
              className="flex items-center gap-3 w-full p-2.5 rounded-lg border border-opacity-30 font-medium"
              style={{ borderColor: node.hex, backgroundColor: `${node.hex}10`, color: node.hex }}
            >
              {node.icon}
              <span className="text-gray-100 text-sm">{node.label}</span>
            </div>
          ))}
        </div>
        <div className="mt-auto opacity-50 text-xs text-center w-full pt-4">
          <p>Switch to <span className="text-pop-cyan font-semibold">Build</span> to compose from scratch.</p>
        </div>
      </div>
    );

    const DemoControlsBar = ({
      demoSeverity, setDemoSeverity,
      demoGuideOn, setDemoGuideOn,
      demoEngagement, setDemoEngagement,
      demoViewpoint, setDemoViewpoint
    }) => (
      <div className="border-b border-teal-900 px-6 py-4 flex flex-wrap items-center gap-x-8 gap-y-3 shrink-0 bg-[#082522] bg-opacity-60">
        <div className="flex items-center gap-2">
          <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mr-1">Severity · one of</span>
          {SEVERITY_OPTIONS.map(s => {
            const active = demoSeverity === s.id;
            return (
              <button
                key={s.id}
                onClick={() => setDemoSeverity(s.id)}
                className={`px-3 py-1.5 rounded-md text-sm font-medium border transition-all flex items-center gap-2 ${
                  active ? 'shadow-sm' : 'border-teal-900 text-gray-400 hover:text-white hover:border-teal-700'
                }`}
                style={active ? { color: s.hex, borderColor: s.hex, backgroundColor: `${s.hex}18` } : {}}
              >
                <span
                  className={`w-3 h-3 rounded-full border ${active ? 'border-current' : 'border-gray-500'}`}
                  style={active ? { backgroundColor: s.hex } : {}}
                ></span>
                {s.label}
              </button>
            );
          })}
        </div>

        <div className="flex items-center gap-2">
          <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mr-1">Overlay · can also be on</span>
          <button
            onClick={() => setDemoGuideOn(!demoGuideOn)}
            className={`px-3 py-1.5 rounded-md text-sm font-medium border transition-all flex items-center gap-2 ${
              demoGuideOn
                ? 'border-pop-violet text-pop-violet bg-pop-violet bg-opacity-10'
                : 'border-teal-900 text-gray-400 hover:text-white hover:border-teal-700'
            }`}
          >
            <span className={`w-3.5 h-3.5 rounded border flex items-center justify-center ${demoGuideOn ? 'bg-pop-violet border-pop-violet' : 'border-gray-500'}`}>
              {demoGuideOn && (
                <svg viewBox="0 0 12 12" className="w-3 h-3 text-[#051614]">
                  <path d="M2 6.5l2.5 2.5L10 3.5" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
              )}
            </span>
            Guide
          </button>
        </div>

        {demoGuideOn && (
          <>
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mr-1">Engagement</span>
              <div className="inline-flex bg-[#072321] border border-teal-900 rounded-md p-0.5">
                {ENGAGEMENT_OPTIONS.map(e => (
                  <button
                    key={e.id}
                    onClick={() => setDemoEngagement(e.id)}
                    className={`px-3 py-1 rounded text-xs font-medium transition-all ${
                      demoEngagement === e.id ? 'bg-pop-violet text-[#051614]' : 'text-gray-400 hover:text-white'
                    }`}
                  >
                    {e.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mr-1">Viewpoint</span>
              <div className="inline-flex bg-[#072321] border border-teal-900 rounded-md p-0.5">
                {VIEWPOINT_OPTIONS.map(v => (
                  <button
                    key={v.id}
                    onClick={() => setDemoViewpoint(v.id)}
                    className={`px-3 py-1 rounded text-xs font-medium transition-all ${
                      demoViewpoint === v.id ? 'bg-pop-violet text-[#051614]' : 'text-gray-400 hover:text-white'
                    }`}
                  >
                    {v.label}
                  </button>
                ))}
              </div>
            </div>
          </>
        )}
      </div>
    );

    const DemoCanvas = ({ activePathway, demoGuideOn, demoSeverity, demoEngagement, demoViewpoint, togglePrescribable, approveLock }) => {
      const rootNode = activePathway.find(n => n.branch === 'root');
      const severityNodes = activePathway.filter(n => n.branch === 'severity');
      const guideNodes = activePathway.filter(n => n.branch === 'guide');
      const severityOpt = SEVERITY_OPTIONS.find(s => s.id === demoSeverity) || SEVERITY_OPTIONS[0];
      const severityHex = severityOpt.hex;
      const guideLabel = `${ENGAGEMENT_OPTIONS.find(e => e.id === demoEngagement)?.label} · ${VIEWPOINT_OPTIONS.find(v => v.id === demoViewpoint)?.label}`;

      return (
        <div className="flex-1 overflow-auto p-8 flex flex-col items-center custom-scrollbar scroll-smooth">
          {rootNode && (
            <div className="w-full max-w-md mb-1 z-10">
              <NodeCard node={rootNode} onToggle={togglePrescribable} onApprove={approveLock} />
            </div>
          )}

          {/* Branch split connector */}
          <div className="relative w-full max-w-3xl h-10 mb-2 flex items-start justify-center pointer-events-none">
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-px h-4 bg-gradient-to-b from-gray-500 to-transparent"></div>
            {demoGuideOn ? (
              <svg viewBox="0 0 200 40" preserveAspectRatio="none" className="absolute top-3 left-1/2 -translate-x-1/2 w-3/4 h-8 overflow-visible">
                <path d="M 100 0 L 100 10 Q 100 18 35 18 L 35 40" stroke={severityHex} strokeWidth="1.5" fill="none" opacity="0.6" />
                <path d="M 100 0 L 100 10 Q 100 18 165 18 L 165 40" stroke="#bf40ff" strokeWidth="1.5" fill="none" opacity="0.6" />
              </svg>
            ) : (
              <div className="absolute top-3 left-1/2 -translate-x-1/2 w-px h-8 bg-gradient-to-b from-gray-500 to-transparent"></div>
            )}
          </div>

          {/* Branch columns */}
          <div className={`w-full grid ${demoGuideOn ? 'grid-cols-2 gap-6 max-w-5xl' : 'grid-cols-1 max-w-md'}`}>
            <div className="flex flex-col items-center">
              <div className="mb-3 flex flex-col items-center gap-1">
                <div className="text-[10px] uppercase tracking-widest font-semibold px-2 py-1 rounded-full border" style={{ color: severityHex, borderColor: `${severityHex}40`, backgroundColor: `${severityHex}10` }}>
                  Severity · {demoSeverity} · CPT {severityOpt.cpt}
                </div>
                <div className="text-[10px] text-gray-500 italic">{severityOpt.cptLabel} · Perry Health workflow library</div>
              </div>
              {severityNodes.map((node, i) => (
                <NodeCard
                  key={node.id}
                  node={node}
                  onToggle={togglePrescribable}
                  onApprove={approveLock}
                  showConnector={i < severityNodes.length - 1}
                />
              ))}
            </div>
            {demoGuideOn && (
              <div className="flex flex-col items-center">
                <div className="text-[10px] uppercase tracking-widest font-semibold mb-3 px-2 py-1 rounded-full border text-pop-violet border-pop-violet border-opacity-40 bg-pop-violet bg-opacity-10">
                  Guide · {guideLabel}
                </div>
                {guideNodes.map((node, i) => (
                  <NodeCard
                    key={node.id}
                    node={node}
                    onToggle={togglePrescribable}
                    onApprove={approveLock}
                    showConnector={i < guideNodes.length - 1}
                  />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    const App = () => {
      const [pathway, setPathway] = useState([]);
      const [mode, setMode] = useState('build');
      const [demoSeverity, setDemoSeverity] = useState('moderate');
      const [demoGuideOn, setDemoGuideOn] = useState(false);
      const [demoEngagement, setDemoEngagement] = useState('full');
      const [demoViewpoint, setDemoViewpoint] = useState('patient');
      const [demoOverrides, setDemoOverrides] = useState({});
      const scrollRef = useRef(null);

      const addNode = (nodeType) => {
        setPathway([...pathway, {
          id: Math.random().toString(36).substr(2, 9),
          typeId: nodeType.id,
          type: nodeType,
          data: { selected: [], approvedLocks: [] }
        }]);
      };

      useEffect(() => {
        // Auto-scroll to bottom when new node is added in Build mode
        if (mode === 'build' && scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [pathway.length, mode]);

      const removeNode = (id) => {
        setPathway(pathway.filter(n => n.id !== id));
      };

      // Resolve a node's current selected + approvedLocks. In demo mode it looks up the
      // template and merges any overrides on top. In build mode it reads the pathway array.
      const resolveNodeState = (id) => {
        if (mode === 'demo') {
          const all = [
            DEMO_TEMPLATES.root,
            ...DEMO_TEMPLATES.severity[demoSeverity],
            ...(demoGuideOn ? (DEMO_TEMPLATES.guide[`${demoEngagement}-${demoViewpoint}`] || []) : [])
          ];
          const template = all.find(n => n.id === id);
          const override = demoOverrides[id] || {};
          return {
            selected: override.selected !== undefined ? override.selected : (template?.data?.selected || []),
            approvedLocks: override.approvedLocks !== undefined ? override.approvedLocks : (template?.data?.approvedLocks || [])
          };
        }
        const n = pathway.find(x => x.id === id);
        return {
          selected: n?.data?.selected || [],
          approvedLocks: n?.data?.approvedLocks || []
        };
      };

      const togglePrescribable = (id, pid) => {
        const { selected, approvedLocks } = resolveNodeState(id);
        const newSelected = selected.includes(pid)
          ? selected.filter(x => x !== pid)
          : [...selected, pid];
        if (mode === 'demo') {
          setDemoOverrides(prev => ({
            ...prev,
            [id]: { ...(prev[id] || {}), selected: newSelected, approvedLocks }
          }));
        } else {
          setPathway(pathway.map(n => n.id === id
            ? { ...n, data: { ...n.data, selected: newSelected } }
            : n));
        }
      };

      const approveLock = (id, pid) => {
        const { selected, approvedLocks } = resolveNodeState(id);
        const newApproved = approvedLocks.includes(pid) ? approvedLocks : [...approvedLocks, pid];
        const newSelected = selected.includes(pid) ? selected : [...selected, pid];
        if (mode === 'demo') {
          setDemoOverrides(prev => ({
            ...prev,
            [id]: { ...(prev[id] || {}), selected: newSelected, approvedLocks: newApproved }
          }));
        } else {
          setPathway(pathway.map(n => n.id === id
            ? { ...n, data: { ...n.data, selected: newSelected, approvedLocks: newApproved } }
            : n));
        }
      };

      // Active pathway: the node list driving canvas + analysis
      const activePathway = useMemo(() => {
        if (mode === 'build') return pathway;
        const templates = [
          DEMO_TEMPLATES.root,
          ...DEMO_TEMPLATES.severity[demoSeverity],
          ...(demoGuideOn ? DEMO_TEMPLATES.guide[`${demoEngagement}-${demoViewpoint}`] || [] : [])
        ];
        return templates.map(n => ({
          ...n,
          data: { ...n.data, ...(demoOverrides[n.id] || {}) }
        }));
      }, [mode, pathway, demoSeverity, demoGuideOn, demoEngagement, demoViewpoint, demoOverrides]);

      // Digital twin logic — operates on the prescribable IDs selected across the active
      // pathway. Both Build and Demo modes feed through the same engine.
      const analysis = useMemo(() => {
        let costImpact = 0;
        let clinicalValidity = 50;
        let recommendations = [];
        const has = new Set();
        let hasGuideOverlay = false;
        let dementiaStage = null;
        let totalSelected = 0;
        let lockedSelected = 0;
        let pendingLocks = 0;

        activePathway.forEach(node => {
          if (node.branch === 'guide') hasGuideOverlay = true;
          const selected = node.data?.selected || [];
          const approved = node.data?.approvedLocks || [];
          totalSelected += selected.length;

          selected.forEach(pid => has.add(pid));
          (PRESCRIBABLES[node.typeId] || []).forEach(p => {
            if (p.locked && selected.includes(p.id)) lockedSelected += 1;
            if (p.locked && !approved.includes(p.id) && !selected.includes(p.id)) pendingLocks += 1;
          });

          if (node.typeId === 'assess') { clinicalValidity += 10; costImpact -= 50; }
          if (node.typeId === 'treat')   { costImpact -= 200; }
          if (node.typeId === 'monitor') { clinicalValidity += 5; costImpact -= 100; }
        });

        if (has.has('dem-mild')) dementiaStage = dementiaStage || 'mild';
        if (has.has('dem-mod'))  dementiaStage = 'moderate';
        if (has.has('dem-sev'))  dementiaStage = 'severe';
        const hasDementia = !!dementiaStage;

        if (has.has('guide-plan') || has.has('guide-compliance')) hasGuideOverlay = true;

        if (hasDementia) {
          clinicalValidity += 10;
          if (dementiaStage === 'severe') {
            costImpact -= 400;
            recommendations.push("High-acuity dementia: digital twin recommends respite, BPSD monitoring, and advance care planning to prevent hospitalization and reduce caregiver burnout.");
          } else if (dementiaStage === 'moderate') {
            recommendations.push("Moderate dementia: care management + caregiver education is the highest-leverage intervention. Layering the Guide overlay unlocks CMS DCMP billing.");
          } else if (dementiaStage === 'mild') {
            recommendations.push("Mild dementia: focus on lifestyle and annual cognitive monitoring. Establish caregiver relationship early to support tier progression later.");
          }
        }

        if (hasGuideOverlay) {
          clinicalValidity += 20;
          costImpact += 1800;
          recommendations.push("CMS GUIDE aligned: DCMP billing eligible (tier-based PMPM). Estimated $1,800+ savings via reduced hospitalization + LTNH avoidance.");
          if (has.has('caregiver-support') || has.has('respite')) {
            costImpact += 600;
            recommendations.push("Caregiver support + respite present: dyad burden reduced, ZBI trend likely to improve. $2,500/yr respite cap covered under GUIDE.");
          }
        }

        if (has.has('digital-twin')) {
          clinicalValidity += 5;
          recommendations.push("Digital Twin progression: weekly biological-trajectory updates feed pre-visit prep and inform care plan adjustments.");
        }

        if (lockedSelected > 0) {
          recommendations.push(`${lockedSelected} approved escalation${lockedSelected === 1 ? '' : 's'} active: these higher-tier prescribables are documented in the patient's plan.`);
        }
        if (pendingLocks > 0 && mode === 'demo') {
          recommendations.push(`${pendingLocks} prescribable${pendingLocks === 1 ? '' : 's'} require${pendingLocks === 1 ? 's' : ''} approval — click any to request escalation and expand the patient's care plan.`);
        }

        if (mode === 'demo' && hasDementia && !hasGuideOverlay) {
          recommendations.push("Gap: this patient could be eligible for CMS GUIDE — layering the Guide overlay would add care navigator, 24/7 helpline, caregiver support and respite, plus tier-based monthly DCMP billing.");
        }

        if (activePathway.length === 0) {
          recommendations.push("Start by dragging or clicking nodes from the left palette to build this patient's care pathway.");
          clinicalValidity = 0;
        } else if (totalSelected === 0 && mode === 'build') {
          recommendations.push("Add at least one prescribable to each node to start building the patient's flow.");
          clinicalValidity = Math.max(clinicalValidity - 15, 0);
        } else if (mode === 'build' && activePathway.length > 5) {
          recommendations.push("Complex Pathway: High number of interventions detected. Ensure patient is not fatigued.");
          costImpact -= 100;
        }

        // Each selected prescribable contributes a small validity bump (richer plan = more validity)
        clinicalValidity += Math.min(totalSelected * 2, 20);

        clinicalValidity = Math.min(100, Math.max(0, clinicalValidity));

        return { costImpact, clinicalValidity, recommendations };
      }, [activePathway, mode]);

      return (
        <div className="flex h-full w-full bg-[#051614] text-gray-100 overflow-hidden">
          {/* LEFT PALETTE / LEGEND */}
          {mode === 'build' ? (
            <div className="w-64 glass-panel border-r border-teal-900 flex flex-col items-center py-6 px-4 shrink-0 transition-all z-20 shadow-xl relative">
              <h2 className="text-xl font-bold mb-6 text-white tracking-widest uppercase">Nodes</h2>
              <div className="flex flex-col gap-4 w-full">
                {NODE_TYPES.map(node => (
                  <button
                    key={node.id}
                    onClick={() => addNode(node)}
                    className={`flex items-center gap-3 w-full p-3 rounded-lg border border-opacity-30 bg-opacity-10 hover:bg-opacity-20 transition-all font-medium`}
                    style={{
                      borderColor: node.hex,
                      backgroundColor: `${node.hex}15`,
                      color: node.hex
                    }}
                  >
                    {node.icon}
                    <span className="text-gray-100">{node.label}</span>
                  </button>
                ))}
              </div>
              <div className="mt-auto opacity-40 text-xs text-center w-full">
                <p>Click a node to append it to the active pathway.</p>
              </div>
            </div>
          ) : (
            <DemoLegend />
          )}

          {/* CENTER CANVAS */}
          <div className="flex-1 flex flex-col relative overflow-hidden bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDAuNWg0MHYwLjVIMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMikiLz48cGF0aCBkPSJNMCAwdjQwSDB6IiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDIpIi8+PC9zdmc+')]">
            <div className="p-6 border-b border-teal-900 glass-panel bg-opacity-50 flex items-center justify-between gap-6">
              <div>
                <h1 className="text-2xl font-bold text-white mb-1">Care Pathway Builder</h1>
                <p className="text-teal-400 opacity-70 text-sm">
                  {mode === 'build'
                    ? 'Visual orchestration and intelligent decision support.'
                    : 'Prebuilt Agilon referral demo · pick a severity, layer Guide overlay.'}
                </p>
              </div>
              <ModeToggle mode={mode} setMode={setMode} />
            </div>

            {mode === 'demo' && (
              <DemoControlsBar
                demoSeverity={demoSeverity}
                setDemoSeverity={setDemoSeverity}
                demoGuideOn={demoGuideOn}
                setDemoGuideOn={setDemoGuideOn}
                demoEngagement={demoEngagement}
                setDemoEngagement={setDemoEngagement}
                demoViewpoint={demoViewpoint}
                setDemoViewpoint={setDemoViewpoint}
              />
            )}

            {mode === 'build' ? (
              <div ref={scrollRef} className="flex-1 overflow-y-auto p-8 relative flex flex-col items-center custom-scrollbar scroll-smooth">
                {pathway.length === 0 ? (
                  <div className="text-gray-500 italic mt-20 flex flex-col items-center">
                    <IconGitBranch size={48} className="opacity-20 mb-4 h-12 w-12" />
                    <p>Select a node from the palette to start building the pathway.</p>
                  </div>
                ) : (
                  <div className="flex flex-col items-center relative w-full max-w-lg pb-32">
                    {pathway.map((node, index) => (
                      <NodeCard
                        key={node.id}
                        node={node}
                        onRemove={removeNode}
                        onToggle={togglePrescribable}
                        onApprove={approveLock}
                        showConnector={index < pathway.length - 1}
                      />
                    ))}
                  </div>
                )}
              </div>
            ) : (
              <DemoCanvas
                activePathway={activePathway}
                demoGuideOn={demoGuideOn}
                demoSeverity={demoSeverity}
                demoEngagement={demoEngagement}
                demoViewpoint={demoViewpoint}
                togglePrescribable={togglePrescribable}
                approveLock={approveLock}
              />
            )}
          </div>

          {/* RIGHT GAMIFICATION / DIGITAL TWIN PANEL */}
          <div className="w-80 glass-panel border-l border-teal-900 flex flex-col z-20 shadow-2xl shrink-0 bg-[#071d1b]">
            <div className="p-5 border-b border-teal-900">
              <h2 className="text-lg font-bold text-white flex items-center gap-2">
                <IconShield /> Digital Twin Analysis
              </h2>
            </div>

            <div className="p-5 flex-1 overflow-y-auto custom-scrollbar">
              <div className="mb-8">
                <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-3">Recommendations</h3>
                {analysis.recommendations.length > 0 ? (
                  <div className="flex flex-col gap-3">
                    {analysis.recommendations.map((rec, i) => (
                      <div key={i} className="bg-brand-900 border border-pop-cyan border-opacity-30 p-3 rounded-lg shadow-sm animate-fade-in-up">
                        <p className="text-sm text-pop-cyan">
                          {rec}
                        </p>
                      </div>
                    ))}
                  </div>
                ) : (
                  <p className="text-sm text-gray-500 italic">No recommendations yet.</p>
                )}
              </div>

              <div className="mb-6 animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-3">Financial Impact</h3>
                <div className="bg-brand-800 rounded-lg p-4 flex items-center gap-3 shadow-inner">
                  <div className={`p-3 rounded-full ${analysis.costImpact >= 0 ? 'bg-pop-green text-pop-green bg-opacity-20' : 'bg-pop-pink text-pop-pink bg-opacity-20'}`}>
                    <IconDollarSign />
                  </div>
                  <div>
                    <p className="text-xs text-gray-400">Total Net Impact</p>
                    <p className={`text-2xl font-bold overflow-hidden text-ellipsis ${analysis.costImpact >= 0 ? 'text-pop-green' : 'text-pop-pink'}`}>
                      {analysis.costImpact >= 0 ? '+' : '-'}${Math.abs(analysis.costImpact).toLocaleString()}
                    </p>
                  </div>
                </div>
                <p className="text-xs text-gray-500 mt-2">Calculated vs. standard fee-for-service events over 12 months.</p>
              </div>

              <div className="mb-6 animate-fade-in-up" style={{ animationDelay: '0.2s' }}>
                <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-3">Clinical Validity Score</h3>
                <div className="bg-brand-800 rounded-lg p-4 relative overflow-hidden shadow-inner">
                  <div className="flex justify-between items-end mb-2">
                    <span className="text-3xl font-bold text-white transition-all">{analysis.clinicalValidity}</span>
                    <span className="text-sm text-gray-400 mb-1">/ 100</span>
                  </div>
                  <div className="w-full bg-[#0a2321] rounded-full h-2">
                    <div
                      className="h-2 rounded-full transition-all duration-700 ease-out"
                      style={{
                        width: `${analysis.clinicalValidity}%`,
                        backgroundColor: analysis.clinicalValidity > 70 ? '#39ff14' : analysis.clinicalValidity > 40 ? '#ffe600' : '#ff2d95'
                      }}
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    .animate-fade-in-up {
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</body>

</html>
