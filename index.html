<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care Pathway Builder</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              900: '#0b3330',
              800: '#114a46',
              700: '#1a5550',
              gray: '#1f2937',
            },
            pop: {
              pink: '#ff2d95',
              cyan: '#00e5ff',
              green: '#39ff14',
              yellow: '#ffe600',
              violet: '#bf40ff',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      background-color: #051614;
      color: #e5e7eb;
    }

    .glass-panel {
      background: rgba(17, 74, 70, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.4);
    }
  </style>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="h-screen w-full overflow-hidden flex flex-col font-sans">
  <div id="root" class="h-full w-full flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // Custom Icons SVG components
    const IconActivity = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const IconGitBranch = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>;
    const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>;
    const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconDollarSign = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
    const IconTrash2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>;

    const NODE_TYPES = [
      { id: 'assess', label: 'Assess', color: 'pop-pink', hex: '#ff2d95', icon: <IconAlertCircle /> },
      { id: 'decide', label: 'Decide', color: 'pop-cyan', hex: '#00e5ff', icon: <IconGitBranch /> },
      { id: 'treat', label: 'Treat', color: 'pop-green', hex: '#39ff14', icon: <IconActivity /> },
      { id: 'monitor', label: 'Monitor', color: 'pop-yellow', hex: '#ffe600', icon: <IconTrendingUp /> },
      { id: 'outcome', label: 'Outcome', color: 'pop-violet', hex: '#bf40ff', icon: <IconCheckCircle /> }
    ];

    // Specific configurations for nodes based on type
    const NODE_CONFIGS = {
      assess: {
        fields: [
          { name: 'condition', label: 'Condition Detected', type: 'select', options: ['None', 'Diabetes', 'Hypertension', 'AFib', 'Cognitive Decline'] },
          { name: 'demographic', label: 'Patient Age Group', type: 'select', options: ['Under 50', '50-65', '65-75', 'Over 75'] }
        ]
      },
      treat: {
        fields: [
          { name: 'treatment', label: 'Treatment Plan', type: 'select', options: ['General Wellness', 'Diabetes Management Program', 'Cardiac Rehab', 'Neurology Consult', 'Medication Adjustment'] }
        ]
      },
      decide: {
        fields: [
          { name: 'criteria', label: 'Decision Criteria', type: 'select', options: ['Review Vitals', 'Check Lab Results', 'Adherence Check', 'Patient Feedback'] }
        ]
      },
      monitor: {
        fields: [
          { name: 'metric', label: 'Metric to Track', type: 'select', options: ['A1c Levels', 'Blood Pressure', 'Heart Rate', 'Cognitive Score (MoCA)'] }
        ]
      },
      outcome: {
        fields: [
          { name: 'goal', label: 'Desired Outcome', type: 'select', options: ['Lower A1c by 10%', 'BP < 130/80', 'Improve MoCA by 2 points', 'Stabilize Rhythm'] }
        ]
      }
    };

    const App = () => {
      const [pathway, setPathway] = useState([]);
      const scrollRef = useRef(null);

      const addNode = (nodeType) => {
        const config = NODE_CONFIGS[nodeType.id];
        const defaultData = {};
        if (config && config.fields) {
          config.fields.forEach(f => defaultData[f.name] = f.options[0]);
        }

        setPathway([...pathway, {
          id: Math.random().toString(36).substr(2, 9),
          typeId: nodeType.id,
          type: nodeType,
          data: defaultData
        }]);
      };

      useEffect(() => {
        // Auto-scroll to bottom when new node is added
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [pathway.length]);

      const removeNode = (id) => {
        setPathway(pathway.filter(n => n.id !== id));
      };

      const updateNodeData = (id, fieldName, value) => {
        setPathway(pathway.map(n => {
          if (n.id === id) {
            return { ...n, data: { ...n.data, [fieldName]: value } };
          }
          return n;
        }));
      };

      // Digital twin logic & GAMIFICATION
      const analysis = useMemo(() => {
        let costImpact = 0;
        let clinicalValidity = 50;
        let recommendations = [];
        let hasDiabetes = false;
        let hasHighAge = false;
        let hasDiabetesTreatment = false;
        let hasMonitoring = false;

        pathway.forEach(node => {
          if (node.typeId === 'assess') {
            clinicalValidity += 10;
            if (node.data.condition === 'Diabetes') hasDiabetes = true;
            if (node.data.demographic === '65-75' || node.data.demographic === 'Over 75') hasHighAge = true;
            costImpact -= 50;
          }
          if (node.typeId === 'treat') {
            if (node.data.treatment === 'Diabetes Management Program') {
              hasDiabetesTreatment = true;
              costImpact -= 300;
            } else {
              costImpact -= 200;
            }
          }
          if (node.typeId === 'monitor') {
            clinicalValidity += 5;
            costImpact -= 100;
            hasMonitoring = true;
          }
        });

        // Synergies and Digital Twin Recommendations
        if (hasDiabetes && hasHighAge) {
          if (!hasDiabetesTreatment) {
            recommendations.push("High Risk: Recommend adding a 'Treat' node for 'Diabetes Management Program'. Digital twin evidence suggests lowering A1c in this demographic prevents costly downstream events.");
          } else {
            clinicalValidity += 30;
            costImpact += 1500;
            recommendations.push("Optimal Care: The Digital Twin confirms that treating diabetes in this elderly cohort significantly reduces overall risk and prevents hospitalizations ($1500+ estimated savings).");
          }
        }

        if (hasDiabetesTreatment && !hasMonitoring) {
          recommendations.push("Gap Detected: Treatment applied without Monitoring. Add a Monitor node to track A1c Levels to ensure clinical validity.");
          clinicalValidity -= 10;
        }

        if (pathway.length === 0) {
          recommendations.push("Start by dragging or clicking nodes from the left palette to build this patient's care pathway.");
          clinicalValidity = 0;
        } else if (pathway.length > 5) {
          recommendations.push("Complex Pathway: High number of interventions detected. Ensure patient is not fatigued.");
          costImpact -= 100;
        }

        clinicalValidity = Math.min(100, Math.max(0, clinicalValidity));

        return { costImpact, clinicalValidity, recommendations };
      }, [pathway]);

      return (
        <div className="flex h-full w-full bg-[#051614] text-gray-100 overflow-hidden">
          {/* LEFT PALETTE */}
          <div className="w-64 glass-panel border-r border-teal-900 flex flex-col items-center py-6 px-4 shrink-0 transition-all z-20 shadow-xl relative">
            <h2 className="text-xl font-bold mb-6 text-white tracking-widest uppercase">Nodes</h2>
            <div className="flex flex-col gap-4 w-full">
              {NODE_TYPES.map(node => (
                <button
                  key={node.id}
                  onClick={() => addNode(node)}
                  className={`flex items-center gap-3 w-full p-3 rounded-lg border border-opacity-30 bg-opacity-10 hover:bg-opacity-20 transition-all font-medium`}
                  style={{
                    borderColor: node.hex,
                    backgroundColor: `${node.hex}15`,
                    color: node.hex
                  }}
                >
                  {node.icon}
                  <span className="text-gray-100">{node.label}</span>
                </button>
              ))}
            </div>
            <div className="mt-auto opacity-40 text-xs text-center w-full">
              <p>Click a node to append it to the active pathway.</p>
            </div>
          </div>

          {/* CENTER CANVAS */}
          <div className="flex-1 flex flex-col relative overflow-hidden bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDAuNWg0MHYwLjVIMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMikiLz48cGF0aCBkPSJNMCAwdjQwSDB6IiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDIpIi8+PC9zdmc+')]">
            <div className="p-6 border-b border-teal-900 glass-panel bg-opacity-50">
              <h1 className="text-2xl font-bold text-white mb-1">Care Pathway Builder</h1>
              <p className="text-teal-400 opacity-70 text-sm">Visual orchestration and intelligent decision support.</p>
            </div>

            <div ref={scrollRef} className="flex-1 overflow-y-auto p-8 relative flex flex-col items-center custom-scrollbar scroll-smooth">
              {pathway.length === 0 ? (
                <div className="text-gray-500 italic mt-20 flex flex-col items-center">
                  <IconGitBranch size={48} className="opacity-20 mb-4 h-12 w-12" />
                  <p>Select a node from the palette to start building the pathway.</p>
                </div>
              ) : (
                <div className="flex flex-col items-center relative w-full max-w-lg pb-32">
                  {pathway.map((node, index) => (
                    <div key={node.id} className="relative flex flex-col items-center w-full">

                      {/* Node Card */}
                      <div
                        className="w-full glass-panel rounded-xl border p-4 mb-2 shadow-2xl relative group hover:scale-[1.02] transition-transform animate-fade-in-up"
                        style={{ borderColor: `${node.type.hex}40` }}
                      >
                        <button
                          onClick={() => removeNode(node.id)}
                          className="absolute top-3 right-3 text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                        >
                          <IconTrash2 />
                        </button>

                        <div className="flex items-center gap-3 mb-4">
                          <div className="p-2 rounded-lg" style={{ backgroundColor: `${node.type.hex}20`, color: node.type.hex }}>
                            {node.type.icon}
                          </div>
                          <h3 className="font-semibold text-lg text-white">{node.type.label}</h3>
                        </div>

                        {/* Fields */}
                        {(NODE_CONFIGS[node.typeId]?.fields || []).map(field => (
                          <div key={field.name} className="mb-3">
                            <label className="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">{field.label}</label>
                            <select
                              className="w-full bg-[#0a2321] border border-teal-800 text-gray-200 text-sm rounded-md p-2 focus:ring-1 focus:outline-none"
                              style={{ focusRing: node.type.hex }}
                              value={node.data[field.name] || ''}
                              onChange={(e) => updateNodeData(node.id, field.name, e.target.value)}
                            >
                              {field.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                            </select>
                          </div>
                        ))}
                      </div>

                      {/* Connector Line */}
                      {index < pathway.length - 1 && (
                        <div className="h-8 w-px bg-gradient-to-b from-gray-500 to-transparent my-1"></div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* RIGHT GAMIFICATION / DIGITAL TWIN PANEL */}
          <div className="w-80 glass-panel border-l border-teal-900 flex flex-col z-20 shadow-2xl shrink-0 bg-[#071d1b]">
            <div className="p-5 border-b border-teal-900">
              <h2 className="text-lg font-bold text-white flex items-center gap-2">
                <IconShield /> Digital Twin Analysis
              </h2>
            </div>

            <div className="p-5 flex-1 overflow-y-auto custom-scrollbar">
              <div className="mb-8">
                <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-3">Recommendations</h3>
                {analysis.recommendations.length > 0 ? (
                  <div className="flex flex-col gap-3">
                    {analysis.recommendations.map((rec, i) => (
                      <div key={i} className="bg-brand-900 border border-pop-cyan border-opacity-30 p-3 rounded-lg shadow-sm animate-fade-in-up">
                        <p className="text-sm text-pop-cyan">
                          {rec}
                        </p>
                      </div>
                    ))}
                  </div>
                ) : (
                  <p className="text-sm text-gray-500 italic">No recommendations yet.</p>
                )}
              </div>

              <div className="mb-6 animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-3">Financial Impact</h3>
                <div className="bg-brand-800 rounded-lg p-4 flex items-center gap-3 shadow-inner">
                  <div className={`p-3 rounded-full ${analysis.costImpact >= 0 ? 'bg-pop-green text-pop-green bg-opacity-20' : 'bg-pop-pink text-pop-pink bg-opacity-20'}`}>
                    <IconDollarSign />
                  </div>
                  <div>
                    <p className="text-xs text-gray-400">Total Net Impact</p>
                    <p className={`text-2xl font-bold overflow-hidden text-ellipsis ${analysis.costImpact >= 0 ? 'text-pop-green' : 'text-pop-pink'}`}>
                      {analysis.costImpact >= 0 ? '+' : '-'}${Math.abs(analysis.costImpact).toLocaleString()}
                    </p>
                  </div>
                </div>
                <p className="text-xs text-gray-500 mt-2">Calculated vs. standard fee-for-service events over 12 months.</p>
              </div>

              <div className="mb-6 animate-fade-in-up" style={{ animationDelay: '0.2s' }}>
                <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-3">Clinical Validity Score</h3>
                <div className="bg-brand-800 rounded-lg p-4 relative overflow-hidden shadow-inner">
                  <div className="flex justify-between items-end mb-2">
                    <span className="text-3xl font-bold text-white transition-all">{analysis.clinicalValidity}</span>
                    <span className="text-sm text-gray-400 mb-1">/ 100</span>
                  </div>
                  <div className="w-full bg-[#0a2321] rounded-full h-2">
                    <div
                      className="h-2 rounded-full transition-all duration-700 ease-out"
                      style={{
                        width: `${analysis.clinicalValidity}%`,
                        backgroundColor: analysis.clinicalValidity > 70 ? '#39ff14' : analysis.clinicalValidity > 40 ? '#ffe600' : '#ff2d95'
                      }}
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    .animate-fade-in-up {
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</body>

</html>
